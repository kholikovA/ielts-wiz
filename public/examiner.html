<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Speaking Examiner</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#0f1114;--bg-card:#181b20;--bg-card-hover:#1e2228;--bg-input:#1a1d22;--bg-elevated:#22262d;--border:#2a2e36;--border-light:#353a44;--text:#e8e6e3;--text-secondary:#9ca3af;--text-muted:#6b7280;--accent:#d4a853;--accent-dim:#b8922e;--accent-glow:rgba(212,168,83,0.15);--accent-glow-strong:rgba(212,168,83,0.25);--red:#e85d5d;--red-dim:rgba(232,93,93,0.12);--green:#5dd4a8;--green-dim:rgba(93,212,168,0.12);--blue:#5da8e8;--blue-dim:rgba(93,168,232,0.12);--radius:10px;--radius-sm:6px;--radius-lg:14px;--shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);--font:'DM Sans',sans-serif;--font-display:'DM Serif Display',serif;--transition:0.2s ease}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-deep);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.app{min-height:100vh;display:flex;flex-direction:column}
.header{position:sticky;top:0;z-index:100;background:rgba(15,17,20,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:12px;cursor:pointer}
.header-logo{font-family:var(--font-display);font-size:20px;color:var(--accent)}
.header-sub{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap}
.btn:hover{background:var(--bg-card-hover);border-color:var(--border-light)}
.btn-accent{background:var(--accent);color:#0f1114;border-color:var(--accent);font-weight:600}
.btn-accent:hover{background:var(--accent-dim);border-color:var(--accent-dim)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-secondary)}
.btn-ghost:hover{background:var(--bg-elevated);color:var(--text)}
.btn-danger{color:var(--red);border-color:rgba(232,93,93,0.3)}
.btn-danger:hover{background:var(--red-dim)}
.btn-icon{padding:6px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--radius-sm);transition:all var(--transition);display:inline-flex;align-items:center}
.btn-icon:hover{background:var(--bg-elevated);color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:24px;width:100%}
.page-title{font-family:var(--font-display);font-size:28px;color:var(--text);margin-bottom:8px}
.page-subtitle{color:var(--text-muted);font-size:14px;margin-bottom:32px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all var(--transition)}
.card:hover{border-color:var(--border-light)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-header h3{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.2px}
.card-body{padding:20px}
input,textarea,select{width:100%;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:13px;transition:all var(--transition);outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px}
.form-group{margin-bottom:16px}
.tabs{display:flex;gap:2px;background:var(--bg-deep);border-radius:var(--radius);padding:3px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 16px;text-align:center;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-radius:var(--radius-sm);transition:all var(--transition);border:none;background:transparent;font-family:var(--font)}
.tab:hover{color:var(--text-secondary)}
.tab.active{background:var(--bg-card);color:var(--accent);box-shadow:var(--shadow)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.badge-accent{background:var(--accent-glow);color:var(--accent)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-red{background:var(--red-dim);color:var(--red)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.test-layout{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start}
.stopwatch{display:flex;align-items:center;gap:8px;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;color:var(--text);padding:6px 14px;background:var(--bg-elevated);border-radius:var(--radius-sm);border:1px solid var(--border)}
.stopwatch-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease infinite}
.stopwatch-dot.paused{background:var(--text-muted);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.countdown{text-align:center;padding:20px;background:var(--bg-elevated);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:16px}
.countdown-label{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:8px}
.countdown-time{font-family:var(--font-display);font-size:48px;color:var(--accent);letter-spacing:2px}
.countdown-time.warning{color:var(--red)}
.countdown-controls{display:flex;gap:8px;justify-content:center;margin-top:12px}
.checklist-group{margin-bottom:12px}
.checklist-band-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:6px 0;display:flex;align-items:center;gap:6px}
.checklist-band-label .band-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);font-size:11px;color:var(--text-secondary)}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition)}
.checklist-item:hover{background:var(--bg-elevated)}
.checklist-box{width:18px;height:18px;min-width:18px;border:1.5px solid var(--border-light);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all var(--transition)}
.checklist-box.checked{background:var(--accent);border-color:var(--accent)}
.checklist-text{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.checklist-item.checked .checklist-text{color:var(--text)}
.question-card{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.question-card:last-child{border-bottom:none}
.question-num{width:28px;height:28px;min-width:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-secondary)}
.question-text{font-size:15px;color:var(--text);line-height:1.6;padding-top:3px}
.cue-card{background:linear-gradient(135deg,#1e2228 0%,#22262d 100%);border:2px solid var(--accent);border-radius:var(--radius-lg);padding:28px;position:relative;overflow:hidden}
.cue-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),transparent)}
.cue-card-title{font-family:var(--font-display);font-size:20px;color:var(--accent);margin-bottom:16px}
.cue-card-prompt{font-size:14px;color:var(--text-secondary);margin-bottom:4px;padding-left:16px;position:relative}
.cue-card-prompt::before{content:'•';position:absolute;left:0;color:var(--accent)}
.topic-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);transition:background var(--transition)}
.topic-item:hover{background:var(--bg-card-hover)}
.topic-item:last-child{border-bottom:none}
.topic-info{display:flex;align-items:center;gap:12px}
.topic-name{font-size:14px;font-weight:500;color:var(--text)}
.topic-count{font-size:12px;color:var(--text-muted)}
.topic-actions{display:flex;gap:4px}
.dash-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center;transition:all var(--transition);cursor:pointer}
.dash-card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow);transform:translateY(-2px)}
.dash-card-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;background:var(--accent-glow);color:var(--accent)}
.dash-card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.dash-card-desc{font-size:12px;color:var(--text-muted)}
.report-criteria-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.report-criterion{background:var(--bg-elevated);border-radius:var(--radius);padding:16px;text-align:center;border:1px solid var(--border)}
.report-criterion-label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:8px}
.report-criterion-score{font-family:var(--font-display);font-size:32px;color:var(--accent)}
.report-overall{text-align:center;padding:32px;background:linear-gradient(135deg,var(--accent-glow) 0%,transparent 100%);border-radius:var(--radius-lg);border:1px solid rgba(212,168,83,0.2)}
.report-overall-score{font-family:var(--font-display);font-size:64px;color:var(--accent);line-height:1}
.report-overall-label{font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:8px}
.notes-display{background:var(--bg-input);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:var(--text-secondary);white-space:pre-wrap;line-height:1.6;min-height:40px}
.collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;border-radius:var(--radius-sm);transition:background var(--transition)}
.collapsible-header:hover{background:var(--bg-elevated)}
.scoring-panel{position:sticky;top:72px;max-height:calc(100vh - 88px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.scoring-panel::-webkit-scrollbar{width:4px}
.scoring-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.override-input{width:54px;text-align:center;padding:4px 6px;font-size:14px;font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-state-icon{width:56px;height:56px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--text-muted);font-size:24px}
.empty-state h3{font-size:16px;color:var(--text-secondary);margin-bottom:4px}
.empty-state p{font-size:13px}
@media(max-width:900px){.test-layout{grid-template-columns:1fr}.scoring-panel{position:static;max-height:none}.grid-3{grid-template-columns:1fr 1fr}.report-criteria-grid{grid-template-columns:1fr 1fr}.container{padding:16px}}
@media(max-width:600px){.grid-3{grid-template-columns:1fr}.report-criteria-grid{grid-template-columns:1fr 1fr}.header{padding:0 12px}.tabs{flex-wrap:wrap}.header-sub{display:none}}
@media print{.header,.btn,.scoring-panel,.tabs,.btn-icon{display:none!important}.card{border:1px solid #ddd;break-inside:avoid}body{background:white;color:black}.report-criterion-score,.report-overall-score,.band-number{color:#333}.report-overall{border:2px solid #333}.test-layout{grid-template-columns:1fr}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp 0.4s ease}

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&display=swap');

:root {
  --bg-deep: #0f1114;
  --bg-card: #181b20;
  --bg-card-hover: #1e2228;
  --bg-input: #1a1d22;
  --bg-elevated: #22262d;
  --border: #2a2e36;
  --border-light: #353a44;
  --text: #e8e6e3;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --accent: #d4a853;
  --accent-dim: #b8922e;
  --accent-glow: rgba(212, 168, 83, 0.15);
  --accent-glow-strong: rgba(212, 168, 83, 0.25);
  --red: #e85d5d;
  --red-dim: rgba(232, 93, 93, 0.12);
  --green: #5dd4a8;
  --green-dim: rgba(93, 212, 168, 0.12);
  --blue: #5da8e8;
  --blue-dim: rgba(93, 168, 232, 0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --font: 'DM Sans', sans-serif;
  --font-display: 'DM Serif Display', serif;
  --transition: 0.2s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* \u2500\u2500\u2500 Header \u2500\u2500\u2500 */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 17, 20, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}

.header-logo {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--accent);
  letter-spacing: -0.3px;
}

.header-sub {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 500;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* \u2500\u2500\u2500 Buttons \u2500\u2500\u2500 */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-light);
}

.btn-accent {
  background: var(--accent);
  color: #0f1114;
  border-color: var(--accent);
  font-weight: 600;
}

.btn-accent:hover {
  background: var(--accent-dim);
  border-color: var(--accent-dim);
}

.btn-sm {
  padding: 5px 10px;
  font-size: 12px;
}

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-secondary);
}

.btn-ghost:hover {
  background: var(--bg-elevated);
  color: var(--text);
}

.btn-danger {
  color: var(--red);
  border-color: rgba(232, 93, 93, 0.3);
}

.btn-danger:hover {
  background: var(--red-dim);
}

.btn-icon {
  padding: 6px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
}

.btn-icon:hover {
  background: var(--bg-elevated);
  color: var(--text);
}

/* \u2500\u2500\u2500 Layout \u2500\u2500\u2500 */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
  width: 100%;
}

.page-title {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--text);
  margin-bottom: 8px;
}

.page-subtitle {
  color: var(--text-muted);
  font-size: 14px;
  margin-bottom: 32px;
}

/* \u2500\u2500\u2500 Cards \u2500\u2500\u2500 */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition);
}

.card:hover {
  border-color: var(--border-light);
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.card-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}

.card-body {
  padding: 20px;
}

/* \u2500\u2500\u2500 Forms \u2500\u2500\u2500 */
input, textarea, select {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  transition: all var(--transition);
  outline: none;
}

input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.form-group {
  margin-bottom: 16px;
}

/* \u2500\u2500\u2500 Tabs \u2500\u2500\u2500 */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-deep);
  border-radius: var(--radius);
  padding: 3px;
  border: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 8px 16px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  border: none;
  background: transparent;
  font-family: var(--font);
}

.tab:hover { color: var(--text-secondary); }
.tab.active {
  background: var(--bg-card);
  color: var(--accent);
  box-shadow: var(--shadow);
}

/* \u2500\u2500\u2500 Tag / Badge \u2500\u2500\u2500 */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.badge-accent {
  background: var(--accent-glow);
  color: var(--accent);
}

.badge-green {
  background: var(--green-dim);
  color: var(--green);
}

.badge-blue {
  background: var(--blue-dim);
  color: var(--blue);
}

.badge-red {
  background: var(--red-dim);
  color: var(--red);
}

/* \u2500\u2500\u2500 Grid \u2500\u2500\u2500 */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

/* \u2500\u2500\u2500 Test layout \u2500\u2500\u2500 */
.test-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 24px;
  align-items: start;
}

/* \u2500\u2500\u2500 Stopwatch \u2500\u2500\u2500 */
.stopwatch {
  display: flex;
  align-items: center;
  gap: 8px;
  font-variant-numeric: tabular-nums;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  padding: 6px 14px;
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.stopwatch-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 1.5s ease infinite;
}

.stopwatch-dot.paused {
  background: var(--text-muted);
  animation: none;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* \u2500\u2500\u2500 Countdown timer \u2500\u2500\u2500 */
.countdown {
  text-align: center;
  padding: 20px;
  background: var(--bg-elevated);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.countdown-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.countdown-time {
  font-family: var(--font-display);
  font-size: 48px;
  color: var(--accent);
  letter-spacing: 2px;
}

.countdown-time.warning {
  color: var(--red);
}

.countdown-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
}

/* \u2500\u2500\u2500 Checklist \u2500\u2500\u2500 */
.checklist-group {
  margin-bottom: 12px;
}

.checklist-band-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 6px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.checklist-band-label .band-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-secondary);
}

.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
}

.checklist-item:hover {
  background: var(--bg-elevated);
}

.checklist-box {
  width: 18px;
  height: 18px;
  min-width: 18px;
  border: 1.5px solid var(--border-light);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all var(--transition);
}

.checklist-box.checked {
  background: var(--accent);
  border-color: var(--accent);
}

.checklist-box.checked svg {
  color: #0f1114;
}

.checklist-text {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.checklist-item.checked .checklist-text {
  color: var(--text);
}

/* \u2500\u2500\u2500 Band display \u2500\u2500\u2500 */
.band-display {
  text-align: center;
  padding: 16px;
}

.band-number {
  font-family: var(--font-display);
  font-size: 42px;
  color: var(--accent);
  line-height: 1;
}

.band-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* \u2500\u2500\u2500 Question display \u2500\u2500\u2500 */
.question-card {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.question-card:last-child {
  border-bottom: none;
}

.question-num {
  width: 28px;
  height: 28px;
  min-width: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}

.question-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
  padding-top: 3px;
}

/* \u2500\u2500\u2500 Part 2 cue card \u2500\u2500\u2500 */
.cue-card {
  background: linear-gradient(135deg, #1e2228 0%, #22262d 100%);
  border: 2px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 28px;
  position: relative;
  overflow: hidden;
}

.cue-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
}

.cue-card-title {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--accent);
  margin-bottom: 16px;
}

.cue-card-prompt {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  padding-left: 16px;
  position: relative;
}

.cue-card-prompt::before {
  content: '\u2022';
  position: absolute;
  left: 0;
  color: var(--accent);
}

/* \u2500\u2500\u2500 Topic list items \u2500\u2500\u2500 */
.topic-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}

.topic-item:hover {
  background: var(--bg-card-hover);
}

.topic-item:last-child {
  border-bottom: none;
}

.topic-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topic-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

.topic-count {
  font-size: 12px;
  color: var(--text-muted);
}

.topic-actions {
  display: flex;
  gap: 4px;
}

/* \u2500\u2500\u2500 Dashboard cards \u2500\u2500\u2500 */
.dash-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  text-align: center;
  transition: all var(--transition);
  cursor: pointer;
}

.dash-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-glow);
  transform: translateY(-2px);
}

.dash-card-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  background: var(--accent-glow);
  color: var(--accent);
}

.dash-card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.dash-card-desc {
  font-size: 12px;
  color: var(--text-muted);
}

/* \u2500\u2500\u2500 Report \u2500\u2500\u2500 */
.report-section {
  margin-bottom: 24px;
}

.report-criteria-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.report-criterion {
  background: var(--bg-elevated);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border);
}

.report-criterion-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.report-criterion-score {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--accent);
}

.report-overall {
  text-align: center;
  padding: 32px;
  background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 100%);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(212, 168, 83, 0.2);
}

.report-overall-score {
  font-family: var(--font-display);
  font-size: 64px;
  color: var(--accent);
  line-height: 1;
}

.report-overall-label {
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 8px;
}

.notes-display {
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  line-height: 1.6;
  min-height: 40px;
}

/* \u2500\u2500\u2500 Collapsible \u2500\u2500\u2500 */
.collapsible-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: background var(--transition);
}

.collapsible-header:hover {
  background: var(--bg-elevated);
}

/* \u2500\u2500\u2500 Scoring sidebar \u2500\u2500\u2500 */
.scoring-panel {
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 88px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.scoring-panel::-webkit-scrollbar {
  width: 4px;
}

.scoring-panel::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

/* \u2500\u2500\u2500 Responsive \u2500\u2500\u2500 */
@media (max-width: 900px) {
  .test-layout {
    grid-template-columns: 1fr;
  }
  .scoring-panel {
    position: static;
    max-height: none;
  }
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .report-criteria-grid { grid-template-columns: 1fr 1fr; }
  .container { padding: 16px; }
}

@media (max-width: 600px) {
  .grid-3 { grid-template-columns: 1fr; }
  .report-criteria-grid { grid-template-columns: 1fr 1fr; }
  .header { padding: 0 12px; }
  .tabs { flex-wrap: wrap; }
  .header-sub { display: none; }
}

/* \u2500\u2500\u2500 Upload area \u2500\u2500\u2500 */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}

.upload-area:hover {
  border-color: var(--accent);
  background: var(--accent-glow);
}

/* \u2500\u2500\u2500 Modal \u2500\u2500\u2500 */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 {
  font-size: 16px;
  font-weight: 600;
}

.modal-body {
  padding: 24px;
}

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* \u2500\u2500\u2500 Empty states \u2500\u2500\u2500 */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.empty-state-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  color: var(--text-muted);
}

.empty-state h3 {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.empty-state p {
  font-size: 13px;
}

/* \u2500\u2500\u2500 Override indicator \u2500\u2500\u2500 */
.override-input {
  width: 54px;
  text-align: center;
  padding: 4px 6px;
  font-size: 14px;
  font-weight: 600;
}

/* \u2500\u2500\u2500 Print \u2500\u2500\u2500 */
@media print {
  .header, .btn, .scoring-panel, .tabs { display: none !important; }
  .card { border: 1px solid #ddd; break-inside: avoid; }
  body { background: white; color: black; }
  .report-criterion-score, .report-overall-score, .band-number { color: #333; }
  .report-overall { border: 2px solid #333; }
}

/* \u2500\u2500\u2500 Animations \u2500\u2500\u2500 */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in {
  animation: fadeIn 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.slide-up {
  animation: slideUp 0.4s ease;
}
